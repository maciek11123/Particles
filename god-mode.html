<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>God Mode Tracker v2</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;900&display=swap');
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#050508;overflow:hidden;font-family:'JetBrains Mono',monospace;user-select:none;touch-action:none;overscroll-behavior:none;}
    video{display:none;}
    #three-canvas,#game-canvas{position:absolute;top:0;left:0;width:100vw;height:100dvh;object-fit:cover;z-index:1;}
    #game-canvas{z-index:2;display:none;}

    #ui{
        position:absolute;bottom:max(15px, env(safe-area-inset-bottom, 15px));
        left:50%;transform:translateX(-50%);
        display:flex;flex-direction:column;gap:8px;z-index:10;align-items:center;
        width:100%;max-width:900px;padding:0 10px;
        transition:opacity 0.3s,transform 0.3s;
    }
    #ui.hidden{opacity:0;pointer-events:none;transform:translateX(-50%) translateY(20px);}

    .panel{
        display:flex;flex-wrap:wrap;justify-content:center;align-items:center;gap:6px;
        background:rgba(10,10,15,0.8);padding:8px 12px;
        border-radius:12px;border:1px solid rgba(255,255,255,0.1);
        backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);width:100%;
    }
    .btn{
        padding:8px 14px;border-radius:6px;font-size:11px;letter-spacing:1px;
        text-transform:uppercase;font-family:inherit;cursor:pointer;
        border:1px solid rgba(255,255,255,0.1);background:transparent;color:rgba(255,255,255,0.5);
        transition:all .2s ease;-webkit-tap-highlight-color:transparent;
    }
    .btn:hover,.btn:active{background:rgba(255,255,255,0.05);color:#fff;}
    .btn.active{background:rgba(0,255,120,0.15);color:#00ff78;border-color:rgba(0,255,120,0.4);}
    .btn-alien{color:#ff4444;border-color:rgba(255,68,68,0.3);}
    .btn-alien.active{background:rgba(255,68,68,0.15);border-color:rgba(255,68,68,0.6);color:#ff4444;}
    .btn-game{color:#00c8ff;border-color:rgba(0,200,255,0.3);}
    .btn-game.active{background:rgba(0,200,255,0.15);border-color:rgba(0,200,255,0.6);color:#fff;}
    .divider{width:1px;background:rgba(255,255,255,0.2);margin:0 4px;height:16px;}

    #hud{
        position:absolute;top:max(20px, env(safe-area-inset-top, 20px));left:max(20px, env(safe-area-inset-left, 20px));
        z-index:10;color:rgba(255,255,255,0.4);font-size:11px;text-transform:uppercase;letter-spacing:2px;
        display:flex;flex-direction:column;gap:4px;pointer-events:none;
    }
    #status{color:#ffaa00;}
    #gesture-status{color:#00c8ff;font-weight:900;letter-spacing:2px;}
    #input-mode{color:rgba(255,255,255,0.3);font-size:9px;}

    #game-ui{
        position:absolute;top:max(20px, env(safe-area-inset-top, 20px));right:max(30px, env(safe-area-inset-right, 30px));
        z-index:10;display:none;font-size:24px;color:#fff;font-weight:bold;font-family:sans-serif;
        text-shadow:0px 4px 15px rgba(0,0,0,0.8);pointer-events:none;
    }

    #toggles{
        position:absolute;top:max(20px, env(safe-area-inset-top, 20px));right:max(20px, env(safe-area-inset-right, 20px));
        z-index:20;display:flex;gap:6px;
    }
    .toggle-btn{
        width:40px;height:40px;border-radius:10px;border:1px solid rgba(255,255,255,0.15);
        background:rgba(10,10,15,0.7);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
        color:rgba(255,255,255,0.5);font-size:16px;cursor:pointer;
        display:flex;align-items:center;justify-content:center;
        transition:all .2s;-webkit-tap-highlight-color:transparent;
    }
    .toggle-btn.active{background:rgba(0,255,120,0.15);color:#00ff78;border-color:rgba(0,255,120,0.4);}
    .toggle-btn:active{transform:scale(0.9);}

    #cam-preview{
        position:absolute;top:max(70px, calc(env(safe-area-inset-top, 20px) + 50px));right:max(20px, env(safe-area-inset-right, 20px));
        z-index:15;border-radius:12px;overflow:hidden;border:2px solid rgba(0,255,120,0.3);
        box-shadow:0 4px 20px rgba(0,0,0,0.6);display:none;
        width:200px;height:150px;background:#000;
    }
    #cam-preview canvas{width:100%;height:100%;object-fit:cover;}

    @media (max-width:600px){
        .btn{padding:6px 8px;font-size:9px;letter-spacing:0.5px;}
        .panel{padding:6px 8px;gap:4px;border-radius:10px;}
        #game-ui{font-size:18px;right:20px;}
        #hud{font-size:9px;}
        .divider{height:12px !important;margin:0 2px !important;}
        .toggle-btn{width:34px;height:34px;font-size:14px;border-radius:8px;}
        #cam-preview{width:150px;height:112px;}
    }
</style>
</head>
<body>
    <video id="cam" autoplay playsinline muted></video>
    <canvas id="three-canvas"></canvas>
    <canvas id="game-canvas"></canvas>

    <div id="hud">
        <div>FPS: <span id="fps">0</span> | <span id="status">Initializing...</span></div>
        <div id="gesture-status">GESTURE: IDLE</div>
        <div id="input-mode"></div>
    </div>
    <div id="game-ui">SCORE: <span id="score">0</span></div>

    <div id="toggles">
        <button class="toggle-btn" id="tog-cam" onclick="toggleCamPreview()" title="Camera Preview">📷</button>
        <button class="toggle-btn" id="tog-ui" onclick="toggleUI()" title="Hide/Show UI">🎛️</button>
    </div>

    <div id="cam-preview"><canvas id="preview-canvas"></canvas></div>

    <div id="ui">
        <div class="panel">
            <button class="btn mode-btn active" id="btn-pond" onclick="setMode('pond','world')">Pond</button>
            <button class="btn mode-btn" id="btn-nebula" onclick="setMode('nebula','world')">Nebula</button>
            <button class="btn mode-btn" id="btn-gravity" onclick="setMode('gravity','world')">Gravity</button>
            <button class="btn mode-btn" id="btn-storm" onclick="setMode('storm','world')">Storm</button>
            <button class="btn mode-btn" id="btn-shatter" onclick="setMode('shatter','world')">Shatter</button>
            <button class="btn mode-btn" id="btn-magnetic" onclick="setMode('magnetic','world')">Magnetic</button>
            <div class="divider"></div>
            <button class="btn mode-btn btn-alien" id="btn-alien" onclick="setMode('alien','world')">Alien</button>
            <button class="btn mode-btn btn-alien" id="btn-heavy" onclick="setMode('heavy','world')">Heavy</button>
        </div>
        <div class="panel">
            <button class="btn mode-btn btn-game" id="btn-bubbles" onclick="setMode('bubbles','game')">🫧 Bubbles</button>
            <button class="btn mode-btn btn-game" id="btn-fruits" onclick="setMode('fruits','game')">🍉 Fruits</button>
            <div class="divider"></div>
            <button class="btn res" onclick="setRes('low')" id="res-low">Low</button>
            <button class="btn res active" onclick="setRes('med')" id="res-med">Med</button>
            <button class="btn res" onclick="setRes('high')" id="res-high">High</button>
        </div>
        <div class="panel" style="background:rgba(0,200,255,0.15);border-color:rgba(0,200,255,0.5);">
            <button class="btn" onclick="toggleCamRotation()" title="Rotate" style="background:transparent;border:none;padding:2px;margin:0 4px;">
                <svg id="phone-icon" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);filter:drop-shadow(0 2px 3px rgba(0,0,0,0.8));">
                    <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
                    <circle cx="12" cy="18" r="1"></circle>
                    <circle cx="12" cy="6" r="1.5" fill="#ffffff"></circle>
                </svg>
            </button>
            <span id="cam-deg" style="font-size:13px;color:#00ff78;font-weight:900;width:28px;text-align:right;">0°</span>
            <div class="divider"></div>
            <button class="btn" id="btn-flipx" onclick="toggleFlipX()" style="color:#00c8ff;border-color:rgba(0,200,255,0.3);">🔄 Flip</button>
        </div>
    </div>

<script>
    // === ENV ===
    var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

    var videoElement = document.getElementById('cam');
    var threeCanvas = document.getElementById('three-canvas');
    var gameCanvas = document.getElementById('game-canvas');
    var ctx = gameCanvas.getContext('2d');
    var statusEl = document.getElementById('status');
    var gestureStatusEl = document.getElementById('gesture-status');
    var inputModeEl = document.getElementById('input-mode');
    var fpsEl = document.getElementById('fps');
    var scoreEl = document.getElementById('score');
    var previewEl = document.getElementById('cam-preview');
    var previewCanvas = document.getElementById('preview-canvas');
    var previewCtx = previewCanvas.getContext('2d');

    var W = window.innerWidth, H = window.innerHeight;
    gameCanvas.width = W; gameCanvas.height = H;

    var lastFrameTime = performance.now();
    var frameCount = 0, time = 0;

    var currentMode = 'pond';
    var currentCategory = 'world';
    var currentRes = isMobile ? 'low' : 'med';
    var resMult = {low:0.3, med:1.0, high:2.0}[currentRes];
    var gameScore = 0;

    // Camera state
    var camRotation = 0;
    var flipX = true;
    var showPreview = false;
    var lastHandResults = null;
    var processCanvasEl = document.createElement('canvas');
    var processCtxEl = processCanvasEl.getContext('2d', { willReadFrequently: true });

    // Gesture state
    var gesture = { count: 0, fist: false, zoom: 1.0, angle: 0, midX: 0.5, midY: 0.5, h1: null, h2: null };
    var s_scale = 1.0, s_rotZ = 0, s_rotX = 0, s_rotY = 0, s_fist = 0.0;
    var inputSource = 'hands';
    var touchPoints = {};

    // === TOGGLES ===
    var uiVisible = true;
    window.toggleUI = function() {
        uiVisible = !uiVisible;
        document.getElementById('ui').classList.toggle('hidden', !uiVisible);
        document.getElementById('tog-ui').classList.toggle('active', !uiVisible);
    };
    window.toggleCamPreview = function() {
        showPreview = !showPreview;
        previewEl.style.display = showPreview ? 'block' : 'none';
        document.getElementById('tog-cam').classList.toggle('active', showPreview);
    };
    window.toggleCamRotation = function() {
        camRotation = (camRotation + 90) % 360;
        document.getElementById('phone-icon').style.transform = 'rotate(' + camRotation + 'deg)';
        document.getElementById('cam-deg').innerText = camRotation + '\u00B0';
    };
    window.toggleFlipX = function() {
        flipX = !flipX;
        document.getElementById('btn-flipx').classList.toggle('active', flipX);
    };
    document.getElementById('btn-flipx').classList.add('active');

    // === TOUCH + MOUSE INPUT ===
    function addInputListeners(el) {
        el.addEventListener('touchstart', function(e) {
            if (gesture.count > 0 && inputSource === 'hands') return;
            e.preventDefault(); inputSource = 'touch'; inputModeEl.textContent = 'INPUT: TOUCH';
            for (var i = 0; i < e.changedTouches.length; i++) {
                var t = e.changedTouches[i];
                touchPoints[t.identifier] = { x: t.clientX, y: t.clientY };
            }
            updateTouchGesture();
        }, { passive: false });
        el.addEventListener('touchmove', function(e) {
            if (inputSource !== 'touch') return; e.preventDefault();
            for (var i = 0; i < e.changedTouches.length; i++) {
                var t = e.changedTouches[i];
                if (touchPoints[t.identifier]) touchPoints[t.identifier] = { x: t.clientX, y: t.clientY };
            }
            updateTouchGesture();
        }, { passive: false });
        el.addEventListener('touchend', function(e) {
            if (inputSource !== 'touch') return;
            for (var i = 0; i < e.changedTouches.length; i++) delete touchPoints[e.changedTouches[i].identifier];
            updateTouchGesture();
            if (Object.keys(touchPoints).length === 0) setTimeout(function() {
                if (Object.keys(touchPoints).length === 0) { inputSource = 'hands'; inputModeEl.textContent = ''; }
            }, 1000);
        }, { passive: false });
        el.addEventListener('mousedown', function(e) {
            if (gesture.count > 0 && inputSource === 'hands') return;
            inputSource = 'touch'; inputModeEl.textContent = 'INPUT: MOUSE';
            touchPoints['mouse'] = { x: e.clientX, y: e.clientY };
            updateTouchGesture();
        });
        el.addEventListener('mousemove', function(e) {
            if (inputSource !== 'touch' || !touchPoints['mouse']) return;
            touchPoints['mouse'] = { x: e.clientX, y: e.clientY };
            updateTouchGesture();
        });
        el.addEventListener('mouseup', function() {
            delete touchPoints['mouse']; updateTouchGesture();
            setTimeout(function() {
                if (Object.keys(touchPoints).length === 0) { inputSource = 'hands'; inputModeEl.textContent = ''; }
            }, 1000);
        });
    }
    addInputListeners(threeCanvas);
    addInputListeners(gameCanvas);

    function updateTouchGesture() {
        var pts = Object.values(touchPoints);
        gesture.count = pts.length; gesture.fist = false; gesture.h1 = null; gesture.h2 = null;
        if (pts.length >= 1) {
            gesture.h1 = { x: pts[0].x / W, y: pts[0].y / H, fist: false };
            gestureStatusEl.textContent = 'TOUCH ACTIVE'; gestureStatusEl.style.color = '#00ff78';
        }
        if (pts.length >= 2) {
            gesture.h2 = { x: pts[1].x / W, y: pts[1].y / H, fist: false };
            gesture.dist = Math.hypot(gesture.h1.x - gesture.h2.x, gesture.h1.y - gesture.h2.y);
            gesture.zoom = gesture.dist;
            gesture.angle = Math.atan2(gesture.h2.y - gesture.h1.y, gesture.h1.x - gesture.h2.x);
            gesture.midX = (gesture.h1.x + gesture.h2.x) / 2; gesture.midY = (gesture.h1.y + gesture.h2.y) / 2;
            gestureStatusEl.textContent = 'PINCH/ROTATE'; gestureStatusEl.style.color = '#00c8ff';
        }
        if (pts.length === 0) {
            gesture.count = 0; gestureStatusEl.textContent = 'IDLE'; gestureStatusEl.style.color = 'rgba(255,255,255,0.4)';
        }
    }

    // === MATH ===
    function hsl(h,s,l){h=((h%1)+1)%1;var a=s*Math.min(l,1-l);function f(n){var k=(n+h*12)%12;return l-a*Math.max(-1,Math.min(k-3,9-k,1))}return[f(0),f(8),f(4)]}
    function n3(x,y,z){var X=Math.floor(x),Y=Math.floor(y),Z=Math.floor(z),fx=x-X,fy=y-Y,fz=z-Z;function h(a,b,c){var v=(a*374761393+b*668265263+c*1274126177)^(a>>>13);v=(v^(v>>>16))*0x45d9f3b;return((v^(v>>>16))&0xfff)/0xfff-.5}function L(a,b,t){return a+(b-a)*t*t*(3-2*t)}return L(L(L(h(X,Y,Z),h(X+1,Y,Z),fx),L(h(X,Y+1,Z),h(X+1,Y+1,Z),fx),fy),L(L(h(X,Y,Z+1),h(X+1,Y,Z+1),fx),L(h(X,Y+1,Z+1),h(X+1,Y+1,Z+1),fx),fy),fz)}

    // === THREE.JS ===
    var scene = new THREE.Scene();
    var worldGroup = new THREE.Group();
    scene.add(worldGroup);
    var camera = new THREE.PerspectiveCamera(75, W/H, 0.1, 2000);
    var renderer = new THREE.WebGLRenderer({ canvas: threeCanvas, alpha: true, antialias: false, powerPreference: 'high-performance' });
    renderer.setSize(W, H);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, isMobile ? 1.5 : 2));

    var orbit={theta:0,phi:Math.PI/3,radius:16}, orbitTarget=new THREE.Vector3(0,0,0);
    function syncOrbit(){var d=camera.position.clone().sub(orbitTarget);orbit.radius=d.length();orbit.phi=Math.acos(Math.max(-1,Math.min(1,d.y/orbit.radius)));orbit.theta=Math.atan2(d.x,d.z)}
    var rayP=new THREE.Plane(new THREE.Vector3(0,1,0),0),rc=new THREE.Raycaster(),ip=new THREE.Vector3();
    function s2w(cx,cy){rc.setFromCamera({x:(cx/W)*2-1,y:-(cy/H)*2+1},camera);if(rc.ray.intersectPlane(rayP,ip))return{x:ip.x,z:ip.z,hit:true};return{x:0,z:0,hit:false}}

    var activeWorld = null;

    function buildLifeform(isHeavy) {
        var radius = isHeavy ? 170 : 160;
        var IcoDetail = currentRes === 'low' ? 3 : (currentRes === 'high' ? 5 : 4);
        var baseGeo = new THREE.IcosahedronGeometry(radius, IcoDetail);
        var baseVerts = baseGeo.attributes.position.array;
        var count = baseVerts.length / 3;
        var geo = new THREE.BufferGeometry();
        var ps = new Float32Array(baseVerts.length), ops = new Float32Array(baseVerts.length), vs = new Float32Array(baseVerts.length), ro = new Float32Array(baseVerts.length);
        for (var i = 0; i < count; i++) {
            var ix=i*3, iy=i*3+1, iz=i*3+2;
            var vec = new THREE.Vector3(baseVerts[ix], baseVerts[iy], baseVerts[iz]).normalize();
            var dist = 1.0 + (Math.random() * (isHeavy ? 1.4 : 1.2) - (isHeavy ? 0.7 : 0.6));
            ps[ix]=ops[ix]=vec.x*radius*dist; ps[iy]=ops[iy]=vec.y*radius*dist; ps[iz]=ops[iz]=vec.z*radius*dist;
            vs[ix]=vs[iy]=vs[iz]=0;
            ro[ix]=Math.random()*Math.PI*2; ro[iy]=Math.random()*Math.PI*2; ro[iz]=Math.random()*Math.PI*2;
        }
        geo.setAttribute('position', new THREE.BufferAttribute(ps, 3));
        geo.setIndex(baseGeo.index);
        var pMat = new THREE.PointsMaterial({color:0xdddddd,size:isHeavy?2.0:1.2,transparent:true,opacity:isHeavy?0.95:0.7});
        var lMat = new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:isHeavy?0.35:0.12});
        var pts = new THREE.Points(geo, pMat); var lns = new THREE.LineSegments(geo, lMat);
        var grp = new THREE.Group(); grp.add(pts); grp.add(lns);
        worldGroup.add(grp);
        var cfg = isHeavy ? {iSpr:0.008,aSpr:0.003,fric:0.92,ampI:10,spdI:0.1,ampA:60,spdA:0.6} : {iSpr:0.02,aSpr:0.008,fric:0.85,ampI:4,spdI:0.3,ampA:40,spdA:3};
        return {
            m:[grp], dc:function(){camera.position.set(0,0,450);camera.lookAt(0,0,0);}, bg:[0.03,0.03,0.03],
            up:function(dt){
                var isAg=gesture.count===2||s_fist>0.1;
                var curSpr=isAg?cfg.aSpr:cfg.iSpr, wAmp=isAg?cfg.ampA:cfg.ampI, wSpd=isAg?cfg.spdA:cfg.spdI;
                for(var i=0;i<count;i++){
                    var ixx=i*3,iyy=i*3+1,izz=i*3+2;
                    var comp=1-(s_fist*0.9);
                    var tx=ops[ixx]*comp+Math.sin(time*wSpd+ro[ixx])*wAmp;
                    var ty=ops[iyy]*comp+Math.cos(time*wSpd+ro[iyy])*wAmp;
                    var tz=ops[izz]*comp+Math.sin(time*wSpd+ro[izz])*wAmp;
                    vs[ixx]+=(tx-ps[ixx])*curSpr;vs[iyy]+=(ty-ps[iyy])*curSpr;vs[izz]+=(tz-ps[izz])*curSpr;
                    if(isAg&&!isHeavy){vs[ixx]+=(Math.random()-.5)*3;vs[iyy]+=(Math.random()-.5)*3;vs[izz]+=(Math.random()-.5)*3;}
                    else if(isAg&&isHeavy){vs[ixx]+=Math.sin(time*1.5+ro[ixx])*.6;vs[iyy]+=Math.cos(time*2+ro[iyy])*.6;vs[izz]+=Math.sin(time+ro[izz])*.6;}
                    vs[ixx]*=cfg.fric;vs[iyy]*=cfg.fric;vs[izz]*=cfg.fric;
                    ps[ixx]+=vs[ixx];ps[iyy]+=vs[iyy];ps[izz]+=vs[izz];
                }
                pts.geometry.attributes.position.needsUpdate=true;
            },
            pm:function(){}
        };
    }

    var Worlds = {
        alien: function(){return buildLifeform(false);},
        heavy: function(){return buildLifeform(true);},
        pond: function(){
            var G=Math.floor(220*Math.sqrt(resMult)),SZ=55,geo=new THREE.PlaneGeometry(SZ,SZ,G,G);geo.rotateX(-Math.PI/2);
            var pos=geo.attributes.position,N=pos.count,C=G+1,cur=new Float32Array(N),vel=new Float32Array(N),edg=new Float32Array(N),B=Math.floor(G*.08);
            for(var r=0;r<C;r++)for(var c=0;c<C;c++){var i=r*C+c;edg[i]=Math.min(1,Math.min(Math.min(c,G-c)/B,Math.min(r,G-r)/B))}
            var cols=new Float32Array(N*3);geo.setAttribute('color',new THREE.BufferAttribute(cols,3));
            var pts=new THREE.Points(geo,new THREE.PointsMaterial({vertexColors:true,size:0.07,sizeAttenuation:true}));
            worldGroup.add(pts);
            function distFn(wx,wz,str){var rd=1.5*Math.max(.3,str);for(var i=0;i<N;i++){var dx=pos.getX(i)-wx,dz=pos.getZ(i)-wz,d2=dx*dx+dz*dz;if(d2<rd*rd)cur[i]-=str*Math.cos(Math.sqrt(d2)/rd*Math.PI*.5)*1.8}}
            var hO=0;
            return{m:[pts],dc:function(){camera.position.set(0,14,1);camera.lookAt(0,0,-3);orbitTarget.set(0,0,-4);syncOrbit()},bg:[0,0,.03],

    // === CAMERA PREVIEW + SKELETON ===
    var HAND_CONNS = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[5,9],[9,10],[10,11],[11,12],[9,13],[13,14],[14,15],[15,16],[13,17],[17,18],[18,19],[19,20],[0,17]];
    function drawPreview(results) {
        if (!showPreview) return;
        var vw = videoElement.videoWidth, vh = videoElement.videoHeight;
        if (!vw || !vh) return;
        previewCanvas.width = 200; previewCanvas.height = 150;
        previewCtx.save();
        if (flipX) { previewCtx.translate(200, 0); previewCtx.scale(-1, 1); }
        previewCtx.drawImage(videoElement, 0, 0, 200, 150);
        previewCtx.restore();
        // Draw skeleton if we have hand data
        if (results && results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            for (var h = 0; h < results.multiHandLandmarks.length; h++) {
                var lm = results.multiHandLandmarks[h];
                if (!lm || lm.length < 21) continue;
                // Draw connections
                previewCtx.strokeStyle = '#00ff78';
                previewCtx.lineWidth = 2;
                for (var c = 0; c < HAND_CONNS.length; c++) {
                    var ai = HAND_CONNS[c][0], bi = HAND_CONNS[c][1];
                    var ax = flipX ? (1-lm[ai].x)*200 : lm[ai].x*200;
                    var ay = lm[ai].y*150;
                    var bx = flipX ? (1-lm[bi].x)*200 : lm[bi].x*200;
                    var by = lm[bi].y*150;
                    previewCtx.beginPath();
                    previewCtx.moveTo(ax, ay);
                    previewCtx.lineTo(bx, by);
                    previewCtx.stroke();
                }
                // Draw joints
                previewCtx.fillStyle = '#ff4444';
                for (var p = 0; p < lm.length; p++) {
                    var px = flipX ? (1-lm[p].x)*200 : lm[p].x*200;
                    var py = lm[p].y*150;
                    previewCtx.beginPath();
                    previewCtx.arc(px, py, 3, 0, Math.PI*2);
                    previewCtx.fill();
                }
            }
            // Show hand count on preview
            previewCtx.fillStyle = '#00ff78';
            previewCtx.font = '12px monospace';
            previewCtx.fillText('HANDS: ' + results.multiHandLandmarks.length, 5, 12);
        } else {
            previewCtx.fillStyle = '#ff4444';
            previewCtx.font = '12px monospace';
            previewCtx.fillText('NO HANDS', 5, 12);
        }
    }

    // === MAIN LOOP ===
    function animate(){
        requestAnimationFrame(animate);
        var now=performance.now();var dt=Math.min((now-lastFrameTime)/1000,0.05);lastFrameTime=now;time+=dt;
        frameCount++;if(frameCount%30===0){
            fpsEl.innerText=Math.round(1/dt);
            inputModeEl.textContent='F:'+debugFramesSent+' R:'+debugResultsReceived+(debugLastError?' ERR:'+debugLastError:'');
        }
        if(currentCategory==='world'&&activeWorld){
            var t_scale=s_scale,t_rotZ=s_rotZ,t_rotX=s_rotX,t_rotY=s_rotY;
            if(gesture.count===2&&gesture.dist>0.08){t_scale=Math.max(0.3,Math.min(5,gesture.zoom*3.5));t_rotZ=gesture.angle;t_rotX=(gesture.midY-.5)*Math.PI;t_rotY=(gesture.midX-.5)*Math.PI;}
            else if(gesture.count>=1){}
            else{t_scale=1;if(currentMode==='alien'||currentMode==='heavy'){t_rotX=s_rotX+.003;t_rotY=s_rotY+.005;}}
            s_scale+=(t_scale-s_scale)*.06;
            var drZ=t_rotZ-s_rotZ;while(drZ>Math.PI)drZ-=Math.PI*2;while(drZ<-Math.PI)drZ+=Math.PI*2;s_rotZ+=drZ*.09;
            s_rotX+=(t_rotX-s_rotX)*.06;s_rotY+=(t_rotY-s_rotY)*.06;
            s_fist+=((gesture.fist?1:0)-s_fist)*.06;
            worldGroup.scale.set(s_scale,s_scale,s_scale);worldGroup.rotation.set(s_rotX,s_rotY,s_rotZ);
            activeWorld.up(dt);
            if(gesture.h1){var w=s2w(gesture.h1.x*W,gesture.h1.y*H);if(w.hit)activeWorld.pm(w.x,w.z,0.5+(s_fist*2));}
            if(gesture.h2){var w2=s2w(gesture.h2.x*W,gesture.h2.y*H);if(w2.hit)activeWorld.pm(w2.x,w2.z,0.5+(s_fist*2));}
            renderer.render(scene,camera);
        }else if(currentCategory==='game'){
            ctx.clearRect(0,0,W,H);
            if(Math.random()<(currentMode==='bubbles'?.03:.02))spawnGameEntity();
            for(var i=entities.length-1;i>=0;i--){
                var e=entities[i];e.y-=e.sy;if(currentMode==='bubbles'){e.wobble+=.05;e.x+=Math.sin(e.wobble)*.5+e.sx;}
                ctx.save();ctx.translate(e.x,e.y);
                if(currentMode==='bubbles'){ctx.beginPath();ctx.arc(0,0,e.r,0,Math.PI*2);ctx.fillStyle=e.color+'40';ctx.fill();ctx.strokeStyle=e.color;ctx.lineWidth=2;ctx.stroke();}
                else{ctx.scale(1+Math.sin(time*3+e.seed)*.05,1+Math.cos(time*4+e.seed)*.05);ctx.rotate(Math.sin(time+e.seed)*.2);ctx.font=(e.r*2)+'px Arial';ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(e.emoji,0,0);}
                ctx.restore();
                var hit=false;
                if(gesture.h1&&Math.hypot((gesture.h1.x*W)-e.x,(gesture.h1.y*H)-e.y)<e.r+30)hit=true;
                if(gesture.h2&&Math.hypot((gesture.h2.x*W)-e.x,(gesture.h2.y*H)-e.y)<e.r+30)hit=true;
                if(hit){createSplash(e.x,e.y,e.color,currentMode==='fruits');gameScore+=(currentMode==='fruits'?15:1);scoreEl.innerText=gameScore;entities.splice(i,1);}
                else if(e.y+e.r<-100){entities.splice(i,1);}
            }
            for(var pi=particles2D.length-1;pi>=0;pi--){
                var p=particles2D[pi];p.x+=p.vx;p.y+=p.vy;p.vy+=.4;p.alpha-=.03;
                if(p.alpha<=0){particles2D.splice(pi,1);continue;}
                ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
                ctx.fillStyle=p.isFruit?(p.color+p.alpha+')'):p.color;
                ctx.globalAlpha=p.isFruit?1:p.alpha;ctx.fill();ctx.globalAlpha=1;
            }
            ctx.strokeStyle=gesture.fist?'#ff4444':'#fff';ctx.fillStyle=gesture.fist?'rgba(255,68,68,0.6)':'rgba(255,255,255,0.6)';ctx.lineWidth=2;
            if(gesture.h1){ctx.beginPath();ctx.arc(gesture.h1.x*W,gesture.h1.y*H,gesture.fist?10:15,0,Math.PI*2);ctx.fill();ctx.stroke();}
            if(gesture.h2){ctx.beginPath();ctx.arc(gesture.h2.x*W,gesture.h2.y*H,gesture.fist?10:15,0,Math.PI*2);ctx.fill();ctx.stroke();}
        }
        drawPreview(lastHandResults);
    }

    // === DEBUG ===
    var debugFramesSent = 0;
    var debugResultsReceived = 0;
    var debugLastError = '';

    // === HAND TRACKING (identical pattern to user's proven working code) ===
    function checkFist(lm){var wr=lm[0],sum=0;[8,12,16,20].forEach(function(idx){sum+=Math.hypot(lm[idx].x-wr.x,lm[idx].y-wr.y);});return(sum/4)<0.25;}

    function onResults(results){
        lastHandResults = results;
        debugResultsReceived++;
        if (inputSource !== 'hands') return;
        gesture.count=0;gesture.h1=null;gesture.h2=null;gesture.fist=false;
        if(results.multiHandLandmarks&&results.multiHandLandmarks.length>0){
            statusEl.textContent='Tracking ('+camRotation+'\u00B0)';statusEl.style.color="#00ff78";
            gesture.count=results.multiHandLandmarks.length;
            var h1=results.multiHandLandmarks[0];
            var h1x = flipX ? (1.0-h1[9].x) : h1[9].x;
            gesture.h1={x:h1x,y:h1[9].y,fist:checkFist(h1)};gesture.fist=gesture.h1.fist;
            if(gesture.count>1){
                var h2=results.multiHandLandmarks[1];
                var h2x = flipX ? (1.0-h2[9].x) : h2[9].x;
                gesture.h2={x:h2x,y:h2[9].y,fist:checkFist(h2)};
                gesture.fist=gesture.h1.fist||gesture.h2.fist;
                gesture.dist=Math.hypot(gesture.h1.x-gesture.h2.x,gesture.h1.y-gesture.h2.y);
                gesture.zoom=gesture.dist;gesture.angle=Math.atan2(gesture.h2.y-gesture.h1.y,gesture.h1.x-gesture.h2.x);
                gesture.midX=(gesture.h1.x+gesture.h2.x)/2;gesture.midY=(gesture.h1.y+gesture.h2.y)/2;
                gestureStatusEl.textContent=gesture.fist?"CRUSHING":"MANIPULATING";gestureStatusEl.style.color=gesture.fist?"#ff4444":"#00c8ff";
            }else{gestureStatusEl.textContent=gesture.fist?"CRUSHING":"POINTER ACTIVE";gestureStatusEl.style.color=gesture.fist?"#ff4444":"#00ff78";}
        }else{
            statusEl.textContent='Searching... ('+camRotation+'\u00B0)';statusEl.style.color="rgba(255,255,255,0.4)";
            gestureStatusEl.textContent="IDLE";gestureStatusEl.style.color="rgba(255,255,255,0.4)";
        }
    }

    // === MEDIAPIPE INIT (exact same pattern as user's proven working code) ===
    var hands = new Hands({locateFile: function(file) { return 'https://cdn.jsdelivr.net/npm/@mediapipe/hands/' + file; }});
    hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    hands.onResults(onResults);

    // === CAMERA BOOT (exact same pattern as user's proven working code) ===
    // Suppress Camera utility's built-in alert on error
    var _origAlert = window.alert;
    window.alert = function(msg) {
        if (typeof msg === 'string' && msg.indexOf('camera') > -1 || msg.indexOf('video') > -1 || msg.indexOf('Failed') > -1) {
            statusEl.textContent = 'CAM ERR (tap to retry)';
            statusEl.style.color = '#ff4444';
            statusEl.style.pointerEvents = 'auto';
            statusEl.style.cursor = 'pointer';
            statusEl.onclick = function() { location.reload(); };
            return;
        }
        _origAlert.call(window, msg);
    };
    var cameraInstance = new Camera(videoElement, {
        onFrame: async function() {
            debugFramesSent++;
            try {
                if (camRotation === 0) {
                    await hands.send({image: videoElement});
                } else {
                var vw = videoElement.videoWidth, vh = videoElement.videoHeight;
                if (!vw || !vh) return;
                if (camRotation === 90 || camRotation === 270) { processCanvasEl.width = vh; processCanvasEl.height = vw; }
                else { processCanvasEl.width = vw; processCanvasEl.height = vh; }
                processCtxEl.save();
                processCtxEl.translate(processCanvasEl.width / 2, processCanvasEl.height / 2);
                processCtxEl.rotate(camRotation * Math.PI / 180);
                processCtxEl.drawImage(videoElement, -vw / 2, -vh / 2, vw, vh);
                processCtxEl.restore();
                await hands.send({image: processCanvasEl});
            }
            } catch(err) { debugLastError = err.message || err.name || 'unknown'; }
        },
        width: isMobile ? 960 : 1280,
        height: isMobile ? 540 : 720,
        facingMode: 'user'
    });
    cameraInstance.start();

    // === BOOT ===
    window.addEventListener('resize', function(){
        W=window.innerWidth;H=window.innerHeight;
        renderer.setSize(W,H);camera.aspect=W/H;camera.updateProjectionMatrix();
        gameCanvas.width=W;gameCanvas.height=H;
    });
    setMode('pond','world');
    animate();
</script>
</body>
